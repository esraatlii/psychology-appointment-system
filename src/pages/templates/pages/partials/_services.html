{% load static %}
<section id="calisma-alanlari" class="py-5 bg-light">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold text-primary display-6">Çalışma Alanları</h2>
            <div class="header-line mx-auto"></div>
        </div>

        <div class="row g-4">

            {% for workspace in workspaces %}
                <div class="col-md-6 col-lg-4">
                    <div class="service-card p-4 text-center h-100 shadow-sm border-0 bg-white">
                        <div class="icon-box mb-3 fs-1">🤝</div>
                        <h5 class="fw-bold text-primary">{{ workspace.title }}</h5>
                        <p class="text-muted small mb-0">{{ workspace.definition }}</p>
                    </div>
                </div>
            {% endfor %}

        </div>
    </div>
</section>
