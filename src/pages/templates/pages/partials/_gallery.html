{% load static %}
<section id="galeri-bolumu" class="py-5 bg-white">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold text-primary">GALERİ</h2>
      <div class="header-line mx-auto"></div>
    </div>

    <div class="row g-3 gallery-grid">

      {% for img in images %}
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item shadow-sm">
            <img src="{{ img.image.url }}" class="img-fluid rounded" alt="{{ img.title|default:'Galeri' }}">
            <div class="gallery-overlay">
              <span>
                {% if img.title %}{{ img.title }}{% else %}Galeri{% endif %}
              </span>
            </div>
          </div>
        </div>
      {% empty %}
        <p class="text-center text-muted">Henüz galeri görseli eklenmedi.</p>
      {% endfor %}

    </div>
  </div>
</section>
