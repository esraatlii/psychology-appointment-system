{% load static %}

<section id="galeri-bolumu" class="gallery-section py-5">
  <div class="container">

    <div class="section-header text-center mb-5">
      <span class="section-tag">Fotoğraflar</span>
      <h2 class="section-title">Galeri</h2>
      <div class="section-line mx-auto"></div>
    </div>

    <div class="row g-3 gallery-grid">
      {% for img in images %}
        <div class="col-lg-4 col-md-6">
          <div class="gallery-item">
            <img src="{{ img.image.url }}" class="gallery-img" alt="{{ img.title|default:'Galeri' }}">
            <div class="gallery-overlay">
              <div class="overlay-content">
                <p class="gallery-caption">{{ img.title|default:'Galeri' }}</p>
              </div>
            </div>
          </div>
        </div>
      {% empty %}
        <div class="col-12 text-center py-5">
          <p class="text-muted">Henüz galeri görseli eklenmedi.</p>
        </div>
      {% endfor %}
    </div>

  </div>
</section>

<style>
  .gallery-section {
    background: #f8faf9;
  }

  .section-tag {
    display: inline-block;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .15em;
    color: #0d9488;
    background: #e6f7f5;
    padding: .25rem .85rem;
    border-radius: 2rem;
    margin-bottom: .75rem;
  }
  .section-title {
    font-size: 2rem;
    font-weight: 800;
    color: #1a2e2b;
    margin-bottom: .5rem;
  }
  .section-line {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, #0d9488, #5eead4);
    border-radius: 2px;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: .85rem;
    aspect-ratio: 4/3;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.08);
  }
  .gallery-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .45s ease;
    display: block;
  }
  .gallery-item:hover .gallery-img {
    transform: scale(1.07);
  }
  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(15,118,110,.85) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .3s ease;
    display: flex;
    align-items: flex-end;
    padding: 1.25rem;
  }
  .gallery-item:hover .gallery-overlay {
    opacity: 1;
  }
  .gallery-tag {
    display: inline-block;
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    background: rgba(255,255,255,.2);
    color: #fff;
    padding: .2rem .6rem;
    border-radius: 1rem;
    margin-bottom: .4rem;
  }
  .gallery-caption {
    color: #fff;
    font-size: .88rem;
    font-weight: 600;
    margin: 0;
  }
  .overlay-content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
</style>
