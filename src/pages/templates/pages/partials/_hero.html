{% load static %}
<section class="bio-section py-5" style="background: linear-gradient(135deg, #f0fdfa 0%, #f8faf9 60%, #f1f5f4 100%);">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-5 text-center mb-4 mb-lg-0">
                <div class="profile-img-wrapper">
                    <img src="{{ psychologist.profile_image.url }}" alt="{{ psychologist.full_name }}" class="img-fluid rounded-circle shadow-lg">
                </div>
            </div>
            
            <div class="col-lg-7 bio-text">
                <h3 class="fw-bold text-secondary text-uppercase small">Klinik Psikolog</h3>
                <h1 class="display-5 fw-bold text-primary mb-4">{{ psychologist.full_name }}</h1>
                
                <p class="lead text-muted">
                    {{ psychologist.short_bio }}
                </p>
                
                <div class="mt-4 d-flex gap-3 justify-content-center justify-content-lg-start">
                    <a href="{% url "aboutme" %}" class="btn btn-primary btn-lg px-4 shadow-sm">Ayrıntılı Özgeçmiş →</a>
                    <a href="{% url 'appointment' %}" class="btn btn-outline-dark btn-lg px-4">Randevu Al 📞</a>
                </div>
            </div>
        </div>
    </div>
</section>
